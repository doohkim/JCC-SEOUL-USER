{% load static %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>교적부 목록</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'attendance/app.css' %}" />
  </head>
  <body>
    <div class="jcc-layout">
      {% include 'includes/jcc_left_nav.html' %}
      <div class="jcc-layout-content">
        <header class="app-header">
          <div class="jcc-detail-titleWrap">
            <h1>교적부</h1>
            <p class="subtitle">멤버 목록 · 상세 · 가족/심방 기록</p>
          </div>
        </header>

        <div class="toolbar jcc-reg-toolbar">
          <div class="field jcc-reg-control">
            <label>부서</label>
            <select id="fltDivision" class="jcc-reg-control"></select>
          </div>
          <div class="field jcc-reg-control">
            <label>팀</label>
            <select id="fltTeam" class="jcc-reg-control"></select>
          </div>
          <div class="field jcc-reg-control" style="min-width: 220px">
            <label>검색</label>
            <input type="search" id="fltQ" class="jcc-reg-control" placeholder="이름/별칭/연락처" />
          </div>
          <button type="button" class="secondary" id="btnRefresh">조회</button>
        </div>

        <main>
          <div class="jcc-reg-listTop">
            <div id="statusLine" class="msg"></div>
            <button
              type="button"
              class="secondary"
              id="btnCreate"
              data-href="{% url 'registry_member_create' %}"
              onclick="window.location.href=this.dataset.href"
            >
              신규
            </button>
          </div>
          <div class="card">
            <div id="teamGroups" class="jcc-team-groups"></div>
          </div>
        </main>

        <div class="jcc-modal-overlay" id="moveModalOverlay" aria-hidden="true">
          <div class="jcc-modal">
            <div class="card">
              <h2 style="margin: 0 0 0.75rem 0;">팀 이동</h2>
              <div id="moveModalStatus" class="msg" style="padding:0 0 0.75rem 0;"></div>

              <div class="toolbar" style="padding:0; border:none; background:transparent;">
                <div class="field" style="min-width: 260px;">
                  <label>현재 부서</label>
                  <div id="moveCurrentDivision" style="font-weight:700; padding-top:0.25rem;"></div>
                </div>
                <div class="field" style="min-width: 260px;">
                  <label>이동할 팀</label>
                  <select id="moveTargetTeam"></select>
                </div>
                <div class="field" style="min-width: 240px;">
                  <label>기본 소속으로</label>
                  <div style="display:flex; align-items:center; gap:0.5rem; padding-top:0.25rem;">
                    <input type="checkbox" id="moveMakePrimary" checked />
                    <span style="color: var(--muted); font-size: 0.9rem;">예</span>
                  </div>
                </div>
              </div>

              <div class="toolbar" style="padding:0; border:none; background:transparent; margin-top:1rem;">
                <button type="button" class="secondary" id="btnMoveCancel">취소</button>
                <button type="button" id="btnMoveSubmit">이동</button>
              </div>
            </div>
          </div>
        </div>

        <script src="{% static 'registry/js/member_list.js' %}"></script>
      </div>
    </div>
    </div>
  </body>
</html>

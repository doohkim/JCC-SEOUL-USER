{% load static permission_tags %}
<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>상담 신청 상세</title>
  <link rel="stylesheet" href="{% static 'attendance/app.css' %}">
  <link href="https://cdn.quilljs.com/1.3.6/quill.snow.css" rel="stylesheet">
  <link rel="stylesheet" href="{% static 'counseling/counseling.css' %}">
</head>
<body>
  <div class="jcc-layout">
    {% include 'includes/jcc_left_nav.html' %}
    <div class="jcc-layout-content">
      <header class="app-header">
        <div class="jcc-detail-titleWrap">
          <h1>상담 신청</h1>
          <p class="subtitle"><a href="{% url 'counseling_home' %}">← 상담으로</a></p>
        </div>
      </header>
      <main>
        <div id="detailMsg" class="card" style="margin-bottom:1rem; display:none;"></div>
        <div class="card" style="margin-bottom:1rem;">
          <h2>요약</h2>
          <div id="summary" class="msg">불러오는 중…</div>
          <div id="actions" style="margin-top:0.75rem;"></div>
        </div>
        {% if is_counselor %}
          <div class="card">
            <h2>상담 메모</h2>
            <p class="subtitle">굵게, 목록 등 편집 후 저장하세요.</p>
            <div id="editor" style="min-height:12rem; background:#fff;"></div>
            <button type="button" id="btnSaveNotes" style="margin-top:0.75rem;">메모 저장</button>
          </div>
        {% endif %}
      </main>
    </div>
  </div>
  <script src="https://cdn.quilljs.com/1.3.6/quill.js"></script>
  <script>
    const CSRF = "{{ csrf_token }}";
    const PUBLIC_ID = "{{ public_id }}";
    const IS_COUNSELOR = {{ is_counselor|yesno:"true,false" }};

    function showMsg(text, isErr) {
      const el = document.getElementById("detailMsg");
      el.style.display = "block";
      el.className = "card " + (isErr ? "msg err" : "msg");
      el.textContent = text;
    }

    async function api(path, opts) {
      const headers = Object.assign({ "X-CSRFToken": CSRF }, opts && opts.headers || {});
      if (opts && opts.body && typeof opts.body === "object" && !(opts.body instanceof FormData)) {
        headers["Content-Type"] = "application/json";
        opts.body = JSON.stringify(opts.body);
      }
      const r = await fetch(path, Object.assign({ credentials: "same-origin" }, opts, { headers }));
      const ct = r.headers.get("content-type") || "";
      const data = ct.includes("application/json") ? await r.json().catch(() => ({})) : {};
      if (!r.ok) throw new Error(data.detail || r.statusText || "요청 실패");
      return data;
    }

    let quill = null;
    if (IS_COUNSELOR) {
      quill = new Quill("#editor", { theme: "snow", modules: { toolbar: [["bold", "italic"], [{ list: "ordered" }, { list: "bullet" }]] } });
    }

    async function load() {
      const r = await api("/api/v1/counseling/requests/" + PUBLIC_ID + "/");
      const slot = r.slot;
      const when = slot ? (slot.date + " " + slot.start_time + "–" + slot.end_time) : "";
      document.getElementById("summary").innerHTML =
        "<div><strong>상태</strong> " + r.status + "</div>" +
        "<div><strong>일시</strong> " + when + "</div>" +
        "<div><strong>신청자</strong> " + (r.applicant_label || "") + "</div>" +
        "<div><strong>상담사</strong> " + (r.counselor_label || "") + "</div>" +
        "<div style=\"margin-top:0.5rem;\"><strong>요청 내용</strong><br>" + (r.applicant_message || "").replace(/</g, "&lt;") + "</div>";

      const act = document.getElementById("actions");
      act.innerHTML = "";
      if (r.status === "pending" && IS_COUNSELOR) {
        const b1 = document.createElement("button");
        b1.textContent = "수락";
        b1.onclick = async () => {
          try {
            await api("/api/v1/counseling/requests/" + PUBLIC_ID + "/accept/", { method: "POST" });
            showMsg("수락했습니다.", false);
            await load();
          } catch (e) {
            showMsg(e.message || String(e), true);
          }
        };
        const b2 = document.createElement("button");
        b2.className = "secondary";
        b2.style.marginLeft = "0.5rem";
        b2.textContent = "거절";
        b2.onclick = async () => {
          try {
            await api("/api/v1/counseling/requests/" + PUBLIC_ID + "/reject/", { method: "POST" });
            showMsg("거절했습니다.", false);
            await load();
          } catch (e) {
            showMsg(e.message || String(e), true);
          }
        };
        act.appendChild(b1);
        act.appendChild(b2);
      }
      if (r.status === "pending" && !IS_COUNSELOR) {
        const b = document.createElement("button");
        b.className = "secondary";
        b.textContent = "신청 취소";
        b.onclick = async () => {
          if (!confirm("취소할까요?")) return;
          try {
            await api("/api/v1/counseling/requests/" + PUBLIC_ID + "/", { method: "DELETE" });
            showMsg("취소했습니다.", false);
            await load();
          } catch (e) {
            showMsg(e.message || String(e), true);
          }
        };
        act.appendChild(b);
      }

      if (IS_COUNSELOR && quill) {
        const notes = r.counselor_notes_json || {};
        if (notes.delta) {
          quill.setContents(notes.delta);
        } else if (notes.html) {
          quill.root.innerHTML = notes.html;
        }
      }
    }

    document.getElementById("btnSaveNotes")?.addEventListener("click", async () => {
      if (!quill) return;
      try {
        await api("/api/v1/counseling/requests/" + PUBLIC_ID + "/", {
          method: "PATCH",
          body: { counselor_notes_json: { delta: quill.getContents(), html: quill.root.innerHTML } },
        });
        showMsg("저장했습니다.", false);
      } catch (e) {
        showMsg(e.message || String(e), true);
      }
    });

    load().catch((e) => {
      document.getElementById("summary").textContent = e.message || String(e);
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>출석 대시보드</title>
  <script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.1/dist/chart.umd.min.js"></script>
  <style>
    :root {
      --bg: #0f1419;
      --card: #1a2332;
      --text: #e7ecf3;
      --muted: #8b9cb3;
      --accent: #3d8fd1;
      --border: #2a3548;
    }
    * { box-sizing: border-box; }
    body {
      font-family: system-ui, -apple-system, "Segoe UI", Roboto, sans-serif;
      margin: 0;
      background: var(--bg);
      color: var(--text);
      line-height: 1.5;
    }
    header {
      padding: 1rem 1.5rem;
      border-bottom: 1px solid var(--border);
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 0.75rem 1.25rem;
    }
    header h1 { font-size: 1.25rem; margin: 0; font-weight: 600; }
    header .user { color: var(--muted); font-size: 0.9rem; }
    header a { color: var(--accent); }
    .toolbar {
      display: flex;
      flex-wrap: wrap;
      gap: 0.75rem 1rem;
      align-items: flex-end;
      padding: 1rem 1.5rem;
      background: #121820;
      border-bottom: 1px solid var(--border);
    }
    .field { display: flex; flex-direction: column; gap: 0.25rem; }
    .field label { font-size: 0.75rem; color: var(--muted); text-transform: uppercase; letter-spacing: 0.04em; }
    select, input[type="search"] {
      background: var(--card);
      border: 1px solid var(--border);
      color: var(--text);
      padding: 0.45rem 0.65rem;
      border-radius: 6px;
      min-width: 10rem;
    }
    button, .btn {
      background: var(--accent);
      color: #fff;
      border: none;
      padding: 0.5rem 1rem;
      border-radius: 6px;
      cursor: pointer;
      font-weight: 600;
      text-decoration: none;
      display: inline-block;
    }
    button.secondary { background: #3a4556; }
    main { padding: 1.25rem 1.5rem 2rem; max-width: 1400px; margin: 0 auto; }
    .grid-charts {
      display: grid;
      grid-template-columns: repeat(auto-fit, minmax(320px, 1fr));
      gap: 1.25rem;
      margin-bottom: 1.5rem;
    }
    .card {
      background: var(--card);
      border: 1px solid var(--border);
      border-radius: 10px;
      padding: 1rem;
    }
    .card h2 { margin: 0 0 0.75rem; font-size: 0.95rem; color: var(--muted); font-weight: 600; }
    .chart-wrap { position: relative; height: 280px; }
    .chart-wrap.tall { height: 320px; }
    .tables { display: grid; grid-template-columns: 1fr; gap: 1.25rem; }
    @media (min-width: 1100px) {
      .tables { grid-template-columns: 1fr 1fr; }
    }
    table { width: 100%; border-collapse: collapse; font-size: 0.875rem; }
    th, td { padding: 0.5rem 0.6rem; text-align: left; border-bottom: 1px solid var(--border); }
    th { color: var(--muted); font-weight: 600; font-size: 0.75rem; text-transform: uppercase; }
    tr:hover td { background: rgba(255,255,255,0.03); }
    .pager { margin-top: 0.75rem; display: flex; gap: 0.5rem; align-items: center; flex-wrap: wrap; }
    .pager button { padding: 0.35rem 0.75rem; font-size: 0.8rem; }
    .msg { color: var(--muted); padding: 1rem; }
    .err { color: #f87171; }
    .tag { display: inline-block; padding: 0.1rem 0.35rem; border-radius: 4px; font-size: 0.72rem; background: #2d3a4f; }
  </style>
</head>
<body>
  <header>
    <h1>출석 대시보드</h1>
    <span class="user">{% if user.is_authenticated %}{{ user.username }}{% endif %}</span>
    <a href="{% url 'admin:index' %}">Admin</a>
    <a href="{% url 'admin:logout' %}">로그아웃</a>
  </header>

  <div class="toolbar">
    <div class="field">
      <label>부서</label>
      <select id="divisionCode"></select>
    </div>
    <div class="field">
      <label>주차 (기준 주일)</label>
      <select id="weekId"></select>
    </div>
    <div class="field">
      <label>예배 구분</label>
      <select id="worshipType"></select>
    </div>
    <button type="button" id="btnRefresh">새로고침</button>
  </div>

  <main>
    <div id="statusLine" class="msg"></div>

    <div class="grid-charts" id="chartArea">
      <div class="card" id="cardSunVenue" style="display:none;">
        <h2>주일 · 장소별</h2>
        <div class="chart-wrap"><canvas id="chartSunVenue"></canvas></div>
      </div>
      <div class="card" id="cardSunPart" style="display:none;">
        <h2>주일 · 서울/인천 부별</h2>
        <div class="chart-wrap tall"><canvas id="chartSunPart"></canvas></div>
      </div>
      <div class="card" id="cardSunTeam" style="display:none;">
        <h2>주일 · 팀별 (상위)</h2>
        <div class="chart-wrap tall"><canvas id="chartSunTeam"></canvas></div>
      </div>
      <div class="card" id="cardMw" style="display:none;">
        <h2>수·토 · 예배별 상태</h2>
        <div class="chart-wrap tall"><canvas id="chartMidweek"></canvas></div>
      </div>
    </div>

    <div class="tables">
      <div class="card" id="panelSunday">
        <h2>주일 출석 행</h2>
        <div class="toolbar" style="padding:0 0 1rem; border:none; background:transparent;">
          <div class="field">
            <label>장소</label>
            <select id="fltVenue"><option value="">전체</option></select>
          </div>
          <div class="field">
            <label>부</label>
            <select id="fltPart">
              <option value="">전체</option>
              <option value="0">0 (온라인·지교)</option>
              <option value="1">1부</option>
              <option value="2">2부</option>
              <option value="3">3부</option>
              <option value="4">4부</option>
              <option value="5">5부</option>
            </select>
          </div>
          <div class="field">
            <label>팀</label>
            <select id="fltTeam"><option value="">전체</option></select>
          </div>
          <div class="field">
            <label>이름 검색</label>
            <input type="search" id="fltSearchSun" placeholder="멤버 이름">
          </div>
          <button type="button" class="secondary" id="btnApplySun">적용</button>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>이름</th>
                <th>장소</th>
                <th>부</th>
                <th>팀</th>
              </tr>
            </thead>
            <tbody id="tbodySun"></tbody>
          </table>
        </div>
        <div class="pager" id="pagerSun"></div>
      </div>

      <div class="card" id="panelMidweek">
        <h2>수·토 출석 행</h2>
        <div class="toolbar" style="padding:0 0 1rem; border:none; background:transparent;">
          <div class="field">
            <label>예배</label>
            <select id="fltSvc">
              <option value="">전체</option>
              <option value="wednesday">수요일</option>
              <option value="saturday">토요일</option>
            </select>
          </div>
          <div class="field">
            <label>상태</label>
            <select id="fltMwStatus">
              <option value="">전체</option>
              <option value="empty">미입력</option>
            </select>
          </div>
          <div class="field">
            <label>이름 검색</label>
            <input type="search" id="fltSearchMw" placeholder="멤버 이름">
          </div>
          <button type="button" class="secondary" id="btnApplyMw">적용</button>
        </div>
        <div style="overflow-x:auto;">
          <table>
            <thead>
              <tr>
                <th>이름</th>
                <th>예배</th>
                <th>상태</th>
              </tr>
            </thead>
            <tbody id="tbodyMw"></tbody>
          </table>
        </div>
        <div class="pager" id="pagerMw"></div>
      </div>
    </div>
  </main>

  <script>
  const API = "/api/v1";

  let charts = { sunVenue: null, sunPart: null, sunTeam: null, midweek: null };
  let sunPageUrl = null;
  let mwPageUrl = null;

  function pathFromDrfUrl(url) {
    const u = new URL(url, window.location.origin);
    let p = u.pathname + u.search;
    if (p.startsWith("/api/v1")) p = p.slice("/api/v1".length);
    return p;
  }

  async function apiGet(path) {
    const r = await fetch(API + path, { credentials: "same-origin" });
    if (r.status === 401) {
      window.location = "/admin/login/?next=" + encodeURIComponent(location.pathname);
      throw new Error("unauthorized");
    }
    if (!r.ok) {
      const t = await r.text();
      throw new Error(t || r.statusText);
    }
    const ct = r.headers.get("content-type") || "";
    if (ct.includes("application/json")) return r.json();
    return r.text();
  }

  function destroyChart(key) {
    if (charts[key]) {
      charts[key].destroy();
      charts[key] = null;
    }
  }

  function setStatus(msg, isErr) {
    const el = document.getElementById("statusLine");
    el.textContent = msg || "";
    el.className = "msg" + (isErr ? " err" : "");
  }

  async function loadMeta() {
    const meta = await apiGet("/attendance/meta/");
    const sel = document.getElementById("worshipType");
    sel.innerHTML = "";
    meta.worship_types.forEach((o) => {
      const opt = document.createElement("option");
      opt.value = o.value;
      opt.textContent = o.label;
      sel.appendChild(opt);
    });
    const fv = document.getElementById("fltVenue");
    while (fv.children.length > 1) fv.removeChild(fv.lastChild);
    meta.venues.forEach((o) => {
      const opt = document.createElement("option");
      opt.value = o.value;
      opt.textContent = o.label;
      fv.appendChild(opt);
    });
    const st = document.getElementById("fltMwStatus");
    while (st.children.length > 2) st.removeChild(st.lastChild);
    meta.midweek_statuses.forEach((o) => {
      const opt = document.createElement("option");
      opt.value = o.value;
      opt.textContent = o.label;
      st.appendChild(opt);
    });
  }

  async function loadDivisions() {
    const list = await apiGet("/attendance/divisions/");
    const sel = document.getElementById("divisionCode");
    sel.innerHTML = "";
    list.forEach((d) => {
      const opt = document.createElement("option");
      opt.value = d.code;
      opt.textContent = d.name + " (" + d.code + ")";
      sel.appendChild(opt);
    });
    if (![...sel.options].some((o) => o.value === "youth")) {
      /* keep first */
    } else {
      sel.value = "youth";
    }
  }

  async function loadWeeks() {
    const code = document.getElementById("divisionCode").value;
    const list = await apiGet("/attendance/weeks/?division_code=" + encodeURIComponent(code));
    const sel = document.getElementById("weekId");
    sel.innerHTML = "";
    list.forEach((w) => {
      const opt = document.createElement("option");
      opt.value = w.id;
      opt.textContent = w.week_sunday + " · 주일 " + w.sunday_line_count + " · 수토 " + w.midweek_record_count;
      sel.appendChild(opt);
    });
    if (list.length === 0) {
      setStatus("해당 부서에 등록된 주차가 없습니다.", true);
    } else {
      setStatus("");
    }
  }

  async function loadTeams() {
    const code = document.getElementById("divisionCode").value;
    const list = await apiGet("/attendance/teams/?division_code=" + encodeURIComponent(code));
    const sel = document.getElementById("fltTeam");
    sel.innerHTML = '<option value="">전체</option>';
    list.forEach((t) => {
      const opt = document.createElement("option");
      opt.value = t.id;
      opt.textContent = t.name;
      sel.appendChild(opt);
    });
  }

  function showChartCards(wtype) {
    const sun = wtype === "all" || wtype === "sunday";
    const mw = wtype === "all" || wtype === "midweek" || wtype === "wednesday" || wtype === "saturday";
    document.getElementById("cardSunVenue").style.display = sun ? "block" : "none";
    document.getElementById("cardSunPart").style.display = sun ? "block" : "none";
    document.getElementById("cardSunTeam").style.display = sun ? "block" : "none";
    document.getElementById("cardMw").style.display = mw ? "block" : "none";
    document.getElementById("panelSunday").style.display = sun ? "block" : "none";
    document.getElementById("panelMidweek").style.display = mw ? "block" : "none";
  }

  async function loadSummary() {
    const wid = document.getElementById("weekId").value;
    if (!wid) return;
    const wtype = document.getElementById("worshipType").value;
    showChartCards(wtype);
    const data = await apiGet("/attendance/weeks/" + wid + "/summary/?worship_type=" + encodeURIComponent(wtype));

    destroyChart("sunVenue");
    destroyChart("sunPart");
    destroyChart("sunTeam");
    destroyChart("midweek");

    if (data.sunday) {
      const bv = data.sunday.by_venue_display || {};
      const labels = Object.keys(bv);
      const values = Object.values(bv);
      const ctx = document.getElementById("chartSunVenue");
      charts.sunVenue = new Chart(ctx, {
        type: "doughnut",
        data: {
          labels: labels.length ? labels : ["데이터 없음"],
          datasets: [{
            data: labels.length ? values : [1],
            backgroundColor: labels.length
              ? ["#3d8fd1", "#5ab87a", "#c9a227", "#a78bfa", "#f472b6", "#94a3b8"]
              : ["#2a3548"],
          }],
        },
        options: { plugins: { legend: { position: "bottom", labels: { color: "#cbd5e1" } } } },
      });

      const parts = data.sunday.by_venue_part || [];
      charts.sunPart = new Chart(document.getElementById("chartSunPart"), {
        type: "bar",
        data: {
          labels: parts.length ? parts.map((p) => p.label) : ["—"],
          datasets: [{
            label: "인원",
            data: parts.length ? parts.map((p) => p.count) : [0],
            backgroundColor: "#3d8fd1",
          }],
        },
        options: {
          indexAxis: "y",
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#94a3b8" }, grid: { color: "#2a3548" } },
            y: { ticks: { color: "#94a3b8" }, grid: { color: "#2a3548" } },
          },
        },
      });

      const teams = data.sunday.by_team || [];
      charts.sunTeam = new Chart(document.getElementById("chartSunTeam"), {
        type: "bar",
        data: {
          labels: teams.length ? teams.map((t) => t.team_name) : ["—"],
          datasets: [{
            label: "인원",
            data: teams.length ? teams.map((t) => t.count) : [0],
            backgroundColor: "#5ab87a",
          }],
        },
        options: {
          indexAxis: "y",
          plugins: { legend: { display: false } },
          scales: {
            x: { ticks: { color: "#94a3b8" }, grid: { color: "#2a3548" } },
            y: { ticks: { color: "#94a3b8", maxRotation: 0 }, grid: { color: "#2a3548" } },
          },
        },
      });
    }

    if (data.midweek && data.midweek.by_service) {
      const svcKeys = Object.keys(data.midweek.by_service);
      const statusSet = new Set();
      svcKeys.forEach((k) => {
        Object.keys(data.midweek.by_service[k].by_status || {}).forEach((s) => statusSet.add(s));
      });
      const statusLabels = [...statusSet];
      const palette = ["#5ab87a", "#f87171", "#3d8fd1", "#c9a227", "#a78bfa", "#94a3b8"];
      if (svcKeys.length && statusLabels.length) {
        const datasets = statusLabels.map((st, i) => ({
          label: st,
          data: svcKeys.map((sk) => (data.midweek.by_service[sk].by_status || {})[st] || 0),
          backgroundColor: palette[i % palette.length],
        }));
        charts.midweek = new Chart(document.getElementById("chartMidweek"), {
          type: "bar",
          data: {
            labels: svcKeys.map((sk) => data.midweek.by_service[sk].label),
            datasets,
          },
          options: {
            responsive: true,
            scales: {
              x: { stacked: true, ticks: { color: "#94a3b8" }, grid: { color: "#2a3548" } },
              y: { stacked: true, ticks: { color: "#94a3b8" }, grid: { color: "#2a3548" } },
            },
            plugins: { legend: { position: "bottom", labels: { color: "#cbd5e1" } } },
          },
        });
      }
    }
  }

  function escapeHtml(s) {
    if (!s) return "";
    return String(s).replace(/[&<>"']/g, (c) => ({ "&": "&amp;", "<": "&lt;", ">": "&gt;", '"': "&quot;", "'": "&#39;" }[c]));
  }

  async function loadSunTable(url) {
    const wid = document.getElementById("weekId").value;
    if (!wid) return;
    let path;
    if (url && (url.startsWith("http") || url.startsWith("/"))) {
      path = pathFromDrfUrl(url);
    } else {
      const p = new URLSearchParams();
      const v = document.getElementById("fltVenue").value;
      const part = document.getElementById("fltPart").value;
      const tid = document.getElementById("fltTeam").value;
      const q = document.getElementById("fltSearchSun").value.trim();
      if (v) p.set("venue", v);
      if (part !== "") p.set("session_part", part);
      if (tid) p.set("team_id", tid);
      if (q) p.set("search", q);
      path = "/attendance/weeks/" + wid + "/sunday/?" + p.toString();
    }
    const data = await apiGet(path);
    paintSunTable(data);
  }

  function paintSunTable(payload) {
    const tb = document.getElementById("tbodySun");
    tb.innerHTML = "";
    (payload.results || []).forEach((r) => {
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + escapeHtml(r.member_name) + "</td><td><span class=\"tag\">" + escapeHtml(r.venue_label) + "</span></td><td>" + (r.session_part || "—") + "</td><td>" + escapeHtml(r.team_name || "—") + "</td>";
      tb.appendChild(tr);
    });
    const pg = document.getElementById("pagerSun");
    pg.innerHTML = "";
    const addBtn = (label, url) => {
      if (!url) return;
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = label;
      b.className = label === "이전" ? "secondary" : "";
      b.onclick = () => loadSunTable(url);
      pg.appendChild(b);
    };
    addBtn("이전", payload.previous);
    addBtn("다음", payload.next);
    if (payload.count != null) {
      const s = document.createElement("span");
      s.style.color = "#8b9cb3";
      s.style.fontSize = "0.85rem";
      s.textContent = "총 " + payload.count + "건";
      pg.appendChild(s);
    }
  }

  async function loadMwTable(url) {
    const wid = document.getElementById("weekId").value;
    if (!wid) return;
    let path;
    if (url && (url.startsWith("http") || url.startsWith("/"))) {
      path = pathFromDrfUrl(url);
    } else {
      const p = new URLSearchParams();
      const svc = document.getElementById("fltSvc").value;
      const st = document.getElementById("fltMwStatus").value;
      const q = document.getElementById("fltSearchMw").value.trim();
      if (svc) p.set("service_type", svc);
      if (st) p.set("status", st);
      if (q) p.set("search", q);
      path = "/attendance/weeks/" + wid + "/midweek/?" + p.toString();
    }
    const data = await apiGet(path);
    const tb = document.getElementById("tbodyMw");
    tb.innerHTML = "";
    (data.results || []).forEach((r) => {
      const tr = document.createElement("tr");
      tr.innerHTML = "<td>" + escapeHtml(r.member_name) + "</td><td>" + escapeHtml(r.service_label) + "</td><td>" + escapeHtml(r.status_label || "미입력") + "</td>";
      tb.appendChild(tr);
    });
    const pg = document.getElementById("pagerMw");
    pg.innerHTML = "";
    const addBtn = (label, u) => {
      if (!u) return;
      const b = document.createElement("button");
      b.type = "button";
      b.textContent = label;
      b.className = label === "이전" ? "secondary" : "";
      b.onclick = () => loadMwTable(u);
      pg.appendChild(b);
    };
    addBtn("이전", data.previous);
    addBtn("다음", data.next);
    if (data.count != null) {
      const s = document.createElement("span");
      s.style.color = "#8b9cb3";
      s.style.fontSize = "0.85rem";
      s.textContent = "총 " + data.count + "건";
      pg.appendChild(s);
    }
  }

  async function refreshAll() {
    try {
      setStatus("불러오는 중…");
      await loadSummary();
      const wtype = document.getElementById("worshipType").value;
      if (wtype === "all" || wtype === "sunday") await loadSunTable();
      else document.getElementById("tbodySun").innerHTML = "";
      if (wtype === "all" || wtype === "midweek" || wtype === "wednesday" || wtype === "saturday") await loadMwTable();
      else document.getElementById("tbodyMw").innerHTML = "";
      setStatus(
        "주차: " + (document.getElementById("weekId").selectedOptions[0]?.textContent || "") +
        " · 예배: " + document.getElementById("worshipType").selectedOptions[0]?.textContent
      );
    } catch (e) {
      console.error(e);
      setStatus("오류: " + e.message, true);
    }
  }

  document.getElementById("btnRefresh").onclick = refreshAll;
  document.getElementById("btnApplySun").onclick = () => loadSunTable();
  document.getElementById("btnApplyMw").onclick = () => loadMwTable();
  document.getElementById("divisionCode").onchange = async () => {
    await loadWeeks();
    await loadTeams();
    await refreshAll();
  };
  document.getElementById("weekId").onchange = refreshAll;
  document.getElementById("worshipType").onchange = refreshAll;

  (async function init() {
    try {
      await loadMeta();
      await loadDivisions();
      await loadWeeks();
      await loadTeams();
      await refreshAll();
    } catch (e) {
      console.error(e);
      setStatus("초기화 실패: " + e.message, true);
    }
  })();
  </script>
</body>
</html>

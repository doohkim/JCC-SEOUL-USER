{% load static %}
<!DOCTYPE html>
<html lang="ko">
  <head>
    <meta charset="utf-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>교적부 폼</title>
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link
      href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans:wght@400;500;600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="{% static 'attendance/app.css' %}" />
  </head>
  <body>
    <div class="jcc-layout">
      {% include 'includes/jcc_left_nav.html' %}
      <div class="jcc-layout-content">
        <header class="app-header">
      <button
        type="button"
        class="jcc-back-link"
        id="btnBack"
        aria-label="뒤로가기"
        onclick="history.back()"
      >
        ←
      </button>
      <div class="jcc-detail-titleWrap">
        <h1>교적부 · {{ mode|default:"create" }}</h1>
        <p class="subtitle">기본 정보 + 교적 프로필</p>
      </div>
        </header>

    <div class="toolbar jcc-member-form-actions">
      <a class="jcc-action-link" href="{% url 'registry_member_list' %}">목록</a>
      <button type="button" id="btnSave">저장</button>
    </div>

    <main>
      <div id="statusLine" class="msg"></div>
      <div class="card" style="max-width: 900px; margin: 0 auto;">
        <div class="jcc-member-photo-header">
          <div class="jcc-photo-card">
            <div class="jcc-photo-preview-wrap">
              <div class="jcc-photo-head">
                <div class="jcc-photo-title">프로필 사진</div>
              </div>
              <img
                id="photoPreview"
                class="jcc-photo-preview"
                alt="프로필 사진 미리보기"
                src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIiB2aWV3Qm94PSIwIDAgMTgwIDE4MCI+CjxyZWN0IHdpZHRoPSIxODAiIGhlaWdodD0iMTgwIiByeD0iMTYiIGZpbGw9IiMwZjE3MjIiLz4KPGNpcmNsZSBjeD0iOTAiIGN5PSI3MiIgcj0iMjgiIGZpbGw9IiMxYjI0MzAiIHN0cm9rZT0iIzJhMzU0OCIvPgo8cGF0aCBkPSJNMzAgMTYwYzgtMzYgMzQtNTYgNjAtNTZzNTIgMjAgNjAgNTYiIGZpbGw9IiMxYjI0MzAiIHN0cm9rZT0iIzJhMzU0OCIvPgo8L3N2Zz4="
              />
              <div class="jcc-photo-actions jcc-photo-actions--center">
                <input type="file" id="p_photo" accept="image/*" class="jcc-file-input" />
                <label for="p_photo" class="jcc-file-button">사진 선택</label>
              </div>
              <div class="jcc-photo-meta">
                <div class="jcc-file-name" id="p_photoFileName"></div>
              </div>
            </div>
          </div>

          <div class="jcc-photo-card">
            <div class="jcc-photo-preview-wrap-family">
              <div class="jcc-photo-head">
                <div class="jcc-photo-title">가족 사진</div>
              </div>
              <img
                id="familyPhotoPreview"
                class="jcc-photo-preview-small"
                alt="가족사진 미리보기"
                src="data:image/svg+xml;base64,PHN2ZyB4bWxucz0iaHR0cDovL3d3dy53My5vcmcvMjAwMC9zdmciIHdpZHRoPSIyNjAiIGhlaWdodD0iMjYwIiB2aWV3Qm94PSIwIDAgMjYwIDI2MCI+CjxyZWN0IHdpZHRoPSIyNjAiIGhlaWdodD0iMjYwIiByeD0iMTYiIGZpbGw9IiMwZjE3MjIiLz4KPGNpcmNsZSBjeD0iMTA0IiBjeT0iMTAwIiByPSIzMCIgZmlsbD0iIzFiMjQzMCIgc3Ryb2tlPSIjMmEzNTQ4Ii8+CjxwYXRoIGQ9Ik00NiAyMzhjOC00NCAzOC02OCA1OC02OHM1MCAyNCA1OCA2OCIgZmlsbD0iIzFiMjQzMCIgc3Ryb2tlPSIjMmEzNTQ4Ii8+CjxjaXJjbGUgY3g9IjE2NiIgY3k9Ijg4IiByPSIyNCIgZmlsbD0iIzI0MmY0MSIgc3Ryb2tlPSIjMzA0MDU4Ii8+CjxwYXRoIGQ9Ik0xMzIgMjM4YzYtMzYgMzItNTYgNTAtNTZzNDQgMjAgNTAgNTYiIGZpbGw9IiMyNDJmNDEiIHN0cm9rZT0iIzMwNDA1OCIvPgo8L3N2Zz4="
              />
              <div class="jcc-photo-actions jcc-photo-actions--center">
                <input
                  type="file"
                  id="p_family_photo"
                  accept="image/*"
                  class="jcc-file-input"
                />
                <label for="p_family_photo" class="jcc-file-button">사진 선택</label>
              </div>
              <div class="jcc-photo-meta">
                <div class="jcc-file-name" id="p_familyPhotoFileName"></div>
              </div>
            </div>
          </div>
        </div>

        <div class="jcc-reg-form-grid jcc-member-inline-form" style="padding: 0; border: none; background: transparent; margin-top: 0.45rem; margin-bottom: 0.75rem;">
          <div class="field"><label>이름*</label><input type="text" id="m_name" class="jcc-reg-control" /></div>
          <div class="field"><label>별칭</label><input type="text" id="m_alias" class="jcc-reg-control" /></div>
        </div>
        <div class="jcc-reg-form-grid jcc-member-inline-form" style="padding: 0; border: none; background: transparent; margin-bottom: 1rem;">
          <div class="field"><label>부서</label><select id="m_division" class="jcc-reg-control"></select></div>
          <div class="field"><label>팀</label><select id="m_team" class="jcc-reg-control"></select></div>
        </div>
        <input type="hidden" id="m_membershipId" />

        <section class="jcc-profile-section jcc-profile-section--registryProfile">
          <h2 style="margin:0 0 0.85rem 0">교적 프로필</h2>
          <div class="jcc-reg-form-grid jcc-member-inline-form" style="padding:0; border:none; background:transparent;">
            <div class="field"><label>생년월일</label><input type="date" id="p_birth" class="jcc-reg-control" /></div>
            <div class="field"><label>핸드폰번호</label><input type="text" id="p_phone" class="jcc-reg-control" /></div>
          </div>
          <div class="jcc-reg-form-grid jcc-member-inline-form" style="padding:0; border:none; background:transparent; margin-top:0.75rem;">
            <div class="field jcc-field-full"><label>주소</label><input type="text" id="p_address" class="jcc-reg-control" /></div>
          </div>
          <div class="jcc-reg-form-grid jcc-member-inline-form" style="padding:0; border:none; background:transparent; margin-top:0.75rem;">
            <div class="field">
              <label>직책(카드)</label>
              <select id="p_pos" class="jcc-reg-control"></select>
            </div>
            <div class="field"><label>직장(업무)</label><input type="text" id="p_work" class="jcc-reg-control" /></div>
          </div>
          <div class="jcc-reg-form-grid jcc-member-inline-form" style="padding:0; border:none; background:transparent; margin-top:0.75rem;">
            <div class="field jcc-field-full jcc-field-stack">
              <label>메모</label>
              <textarea id="p_staff_notes" class="jcc-reg-control" rows="5"></textarea>
            </div>
          </div>
        </section>
      </div>

      {% if mode == "create" %}
      <div class="card jcc-member-form-familyCard" style="max-width: 900px; margin: 1.25rem auto 0;">
        <section class="jcc-profile-section jcc-profile-section--family">
          <h2 style="margin:0 0 0.35rem 0">가족 정보</h2>
          <p class="subtitle" style="margin:0 0 0.75rem 0; font-size: 0.9rem">
            가족 구성원을 행 단위로 입력합니다. (선택)
          </p>
          <div id="familyRowsHost"></div>
          <div class="jcc-family-form-addRow">
            <button type="button" class="secondary" id="btnAddFamilyRow">가족 행 추가</button>
          </div>
        </section>
      </div>
      {% else %}
      <div class="card jcc-member-form-familyCard" style="max-width: 900px; margin: 1.25rem auto 0;">
        <div class="jcc-member-form-familyEditBanner">
          <div>
            <h2 style="margin:0 0 0.25rem 0">가족 정보</h2>
            <p class="subtitle" style="margin:0">가족 행 추가·수정은 전용 화면에서 합니다.</p>
          </div>
          <a class="jcc-action-link" href="{% url 'registry_member_family' member_id %}">가족 정보 관리</a>
        </div>
      </div>
      {% endif %}
    </main>

    <script>
      window.__MODE__ = "{{ mode|default:'create' }}";
      window.__MEMBER_ID__ = "{{ member_id|default:'null' }}";
    </script>
        <script src="{% static 'registry/js/member_form.js' %}"></script>
      </div>
    </div>
  </body>
</html>

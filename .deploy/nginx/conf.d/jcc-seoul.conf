upstream django_upstream {
    server django:8000;
}

server {
    listen 80;
    listen [::]:80;
    server_name
        shalom.jcc-seoul.com
        shalom.admin.jcc-seoul.com
        shalom.api.jcc-seoul.com
        shalom.docs.jcc-seoul.com;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name shalom.jcc-seoul.com;

    ssl_certificate /etc/letsencrypt/live/shalom.jcc-seoul.com/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/shalom.jcc-seoul.com/privkey.pem;
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers HIGH:!aNULL:!MD5;

    client_max_body_size 20m;

    location /static/ {
        alias /srv/.static/;
        expires 30d;
        access_log off;
    }

    location /media/ {
        alias /srv/.media/;
        expires 7d;
        access_log off;
    }

    location / {
        proxy_pass http://django_upstream;
        proxy_set_header Host $host;
        proxy_set_header X-Forwarded-Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto https;
        proxy_redirect off;
    }
}

